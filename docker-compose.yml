services:
  qwen:
    build: .
    image: qwen-jetson:latest
    container_name: qwen-jetson
    runtime: nvidia
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ${OLLAMA_DATA_PATH:-./ollama-data}:/root/.ollama
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      # Keep only one model loaded at a time — Orin Nano shares 8GB with
      # the OS, so multi-model caching quickly OOMs.
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_NUM_PARALLEL=1
      # Flash attention + quantised KV cache shrink context memory a lot.
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_KV_CACHE_TYPE=q8_0
    # CUDA/NvMap on Tegra locks GPU memory via mlock; the default 64KB
    # limit causes cudaMalloc failures. Lift it to unlimited.
    ulimits:
      memlock: -1
      stack: 67108864
